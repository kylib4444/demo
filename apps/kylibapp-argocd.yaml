apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kylibapp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kylib4444/AsciiArtify.git
    targetRevision: main
    path: apps/kylibapp
  destination:
    server: https://kubernetes.default.svc
    namespace: kylibapp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
